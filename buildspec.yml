version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - 'echo "Install phase: move to backend and install dependencies"'
      - 'cd user/backend'
      - 'npm ci'

  pre_build:
    commands:
      - 'echo "Pre-build: node $(node -v)  npm $(npm -v)"'
      - 'echo "Optional: test database/connection if script exists"'
      - 'if [ -f package.json ] && npm run | grep -q " test-connection"; then npm run test-connection || echo "test-connection failed or returned non-zero - continuing"; else echo "No test-connection script"; fi'

  build:
    commands:
      - 'echo "No compile/build step required for this project (no build script). Skipping."'

  post_build:
    commands:
      - 'echo "Post-build: preparing artifacts"'
      - 'echo "Build finished at $(date)"'

cache:
  paths:
    - user/backend/.npm/**/*
    - user/backend/node_modules/**/*

artifacts:
  base-directory: user/backend
  discard-paths: no
  files:
    - package.json
    - package-lock.json
    - server.js
    - index.js
    - app.js
    - lib/**/*
    - controllers/**/*
    - models/**/*
    - routes/**/*
    - middleware/**/*
    - uploads/**/*
    - scripts/**/*
    - utils/**/*
    - .ebextensions/**/*
    - Procfile
