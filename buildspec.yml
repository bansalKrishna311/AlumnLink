version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Starting install phase"
      - cd user/backend
      - echo "Installing dependencies (npm ci)"
      - npm ci

  pre_build:
    commands:
      - echo "Pre-build: node $(node -v)  npm $(npm -v)"
      - echo "Running tests (if any)..."
      - if [ -f package.json ]; then npm test || echo "Tests failed or not present - continuing"; fi

  build:
    commands:
      - echo "Build step (if defined in package.json)"
      - if npm run | grep -q " build"; then npm run build || echo "Build failed - continuing"; else echo "No build script"; fi

  post_build:
    commands:
      - echo "Post-build: preparing artifact"
      - echo "Build finished at $(date)"

cache:
  paths:
    - user/backend/.npm/**/*
    - user/backend/node_modules/**/*

artifacts:
  base-directory: user/backend
  discard-paths: no
  files:
    - package.json
    - package-lock.json
    - server.js
    - index.js
    - app.js
    - dist/**/*
    - build/**/*
    - lib/**/*
    - controllers/**/*
    - models/**/*
    - routes/**/*
    - middleware/**/*
    - uploads/**/*
    - scripts/**/*
    - .ebextensions/**/*
    - Procfile
